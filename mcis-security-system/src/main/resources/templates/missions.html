<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Mission Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/">

<i class="bi bi-shield-lock-fill text-danger"></i>

MCIS

</a>

<a href="/" class="btn btn-outline-light">

Dashboard

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card">

<div class="card-header bg-primary text-white">

<h3>

<i class="bi bi-folder2-open"></i>

Mission Management

</h3>

</div>

<div class="card-body">

<table class="table table-hover align-middle">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Mission</th>

<th>Code</th>

<th>Classification</th>

<th>Commander</th>

<th>Status</th>

</tr>

</thead>

<tbody>

<tr th:each="mission : ${missions}">

<td th:text="${mission.id}"></td>

<td>

<a th:href="@{/missions/{id}(id=${mission.id})}"

class="fw-bold"

th:text="${mission.missionName}">

</a>

</td>

<td th:text="${mission.missionCode}"></td>

<td>

<span class="badge bg-danger"

th:if="${mission.classification.name()=='TOP_SECRET'}">

TOP SECRET

</span>

<span class="badge bg-warning text-dark"

th:if="${mission.classification.name()=='SECRET'}">

SECRET

</span>

<span class="badge bg-primary"

th:if="${mission.classification.name()=='CONFIDENTIAL'}">

CONFIDENTIAL

</span>

<span class="badge bg-success"

th:if="${mission.classification.name()=='RESTRICTED'}">

RESTRICTED

</span>

</td>

<td th:text="${mission.commander}"></td>

<td>

<span class="badge bg-success"

th:if="${mission.active}">

ACTIVE

</span>

</td>

</tr>

</tbody>

</table>

<div class="mt-3">

<a href="/audit"

class="btn btn-warning">

<i class="bi bi-journal-text"></i>

Audit Logs

</a>

</div>

</div>

</div>

</div>

</body>

</html>
