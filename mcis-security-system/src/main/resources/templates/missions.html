<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Mission List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">
Mission Management
</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Mission</th>

<th>Code</th>

<th>Classification</th>

<th>Commander</th>

<th>Status</th>

</tr>

</thead>

<tbody>

<tr th:each="mission : ${missions}">

<td th:text="${mission.id}"></td>

<td>
    <a th:href="@{/missions/{id}(id=${mission.id})}"
       th:text="${mission.missionName}">
    </a>
</td>

<td th:text="${mission.missionCode}"></td>

<td th:text="${mission.classification}"></td>

<td th:text="${mission.commander}"></td>

<td th:text="${mission.active}"></td>

</tr>

</tbody>

</table>
<div class="mt-3">

<a href="/"
class="btn btn-secondary">

Dashboard

</a>

<a href="/audit"
class="btn btn-warning">

Audit Logs

</a>


</body>

</html>
