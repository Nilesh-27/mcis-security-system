<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Mission Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h2 th:text="${mission.missionName}"></h2>

</div>

<div class="card-body">

<p>

<strong>Mission Code:</strong>

<span th:text="${mission.missionCode}"></span>

</p>

<p>

<strong>Description:</strong>

<span th:text="${mission.description}"></span>

</p>

<p>

<strong>Classification:</strong>

<span class="badge bg-danger"
      th:text="${mission.classification}">
</span>

</p>

<p>

<strong>Commander:</strong>

<span th:text="${mission.commander}"></span>

</p>

<p>

<strong>Your Clearance:</strong>

<span class="badge bg-success"
      th:text="${clearance}">
</span>

</p>

<p>

<strong>Status:</strong>

<span th:text="${mission.active}"></span>

</p>

<hr>

<a href="/missions"
   class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</body>

</html>
