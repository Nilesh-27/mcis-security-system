<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Mission Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container mt-5">

<div class="card">

<div class="card-header bg-dark text-white">

<h2>

<i class="bi bi-file-earmark-lock"></i>

Mission Details

</h2>

</div>

<div class="card-body">

<h3 th:text="${mission.missionName}"></h3>

<hr>

<p><strong>Mission Code:</strong>

<span th:text="${mission.missionCode}"></span></p>

<p><strong>Description:</strong>

<span th:text="${mission.description}"></span></p>

<p><strong>Commander:</strong>

<span th:text="${mission.commander}"></span></p>

<p><strong>Classification:</strong>

<span class="badge bg-danger"

th:text="${mission.classification}">

</span></p>

<p><strong>Your Clearance:</strong>

<span class="badge bg-success"

th:text="${clearance}">

</span></p>

<a href="/missions"

class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

</body>

</html>
