<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>MCIS Audit Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">

            <i class="bi bi-shield-lock-fill text-danger"></i>

            Military Command Information System

        </a>

        <a href="/" class="btn btn-outline-light">

            <i class="bi bi-house-door"></i>

            Dashboard

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card">

        <div class="card-header bg-warning">

            <h3 class="mb-0">

                <i class="bi bi-journal-text"></i>

                Security Audit Logs

            </h3>

        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-dark">

                <tr>

                    <th>User</th>

                    <th>Clearance</th>

                    <th>Action</th>

                    <th>Mission</th>

                    <th>Status</th>

                    <th>IP Address</th>

                    <th>Timestamp</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="log : ${logs}">

                    <td th:text="${log.username}"></td>

                    <td>

                        <span class="badge bg-primary"
                              th:text="${log.role}">
                        </span>

                    </td>

                    <td th:text="${log.action}"></td>

                    <td th:text="${log.mission}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:if="${log.status == 'GRANTED'}">

                            GRANTED

                        </span>

                        <span class="badge bg-danger"
                              th:if="${log.status == 'DENIED'}">

                            DENIED

                        </span>

                    </td>

                    <td th:text="${log.ipAddress}"></td>

                    <td th:text="${#temporals.format(log.timestamp,'dd-MM-yyyy HH:mm:ss')}"></td>

                </tr>

                </tbody>

            </table>

            <div class="mt-4">

                <a href="/missions"
                   class="btn btn-primary">

                    <i class="bi bi-folder2-open"></i>

                    Back to Missions

                </a>

                <a href="/"
                   class="btn btn-secondary">

                    <i class="bi bi-house"></i>

                    Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

<footer class="text-center text-muted mt-5">

    <hr>

    <p class="mb-1">

        <strong>Military Command Information System (MCIS)</strong>

    </p>

    <p class="mb-1">

        Powered by Spring Boot • Keycloak • PostgreSQL

    </p>

    <p class="mb-0">

        © 2026 MCIS. All Rights Reserved.

    </p>

</footer>

</body>

</html>
