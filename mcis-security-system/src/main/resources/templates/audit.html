<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Audit Logs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand mb-0 h1">

🛡 Military Command Information System

</span>

<a href="/" class="btn btn-outline-light">

Dashboard

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>

<i class="bi bi-journal-text"></i>

Audit Logs

</h3>

</div>

<div class="card-body">

<table class="table table-hover table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>User</th>
<th>Role</th>
<th>Mission</th>
<th>Action</th>
<th>Status</th>
<th>Timestamp</th>
<th>IP Address</th>

</tr>

</thead>

<tbody>

<tr th:each="log : ${logs}">

<td th:text="${log.id}"></td>

<td th:text="${log.username}"></td>

<td th:text="${log.role}"></td>

<td th:text="${log.mission}"></td>

<td th:text="${log.action}"></td>

<td>

<span class="badge bg-success"
      th:if="${log.status == 'GRANTED'}">

GRANTED

</span>

<span class="badge bg-danger"
      th:if="${log.status == 'DENIED'}">

DENIED

</span>

</td>

<td th:text="${log.timestamp}"></td>

<td th:text="${log.ipAddress}"></td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
